# CLA Assistant — gates pull requests on agreement to CLA.md.
#
# How it works: when a PR is opened, the bot checks whether every commit author
# has signed. If not, it posts a comment asking them to reply with the exact
# phrase below; that reply is recorded in `signatures/version1/cla.json` on the
# default branch, and the PR's CLA status flips to passing.
#
# ONE-TIME REPO SETUP (you must do these in GitHub — a workflow file can't):
#   1. Settings → Actions → General → Workflow permissions → "Read and write
#      permissions" (the bot commits the signatures file).
#   2. If `main` is a protected branch, either allow this action to push to it,
#      or store signatures in a separate repo via remote-organization-name /
#      remote-repository-name + a PERSONAL_ACCESS_TOKEN secret.
#
# Docs: https://github.com/contributor-assistant/github-action
name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write        # needed to commit the signatures file
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        # Pinned to a full commit SHA (not a moving tag) so a compromised or
        # re-pointed v2.6.1 tag can't run arbitrary code with this workflow's
        # contents:write token on pull_request_target. SHA == tag v2.6.1.
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/akar016012/hosts-app-macos/blob/main/CLA.md'
          branch: 'main'
          # Maintainer + common bots don't need to sign.
          allowlist: akar016012,dependabot[bot],github-actions[bot]
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: 'Thanks for the pull request! Before it can be merged, please agree to the [Contributor License Agreement](https://github.com/akar016012/hosts-app-macos/blob/main/CLA.md) by posting the following comment:'
          custom-allsigned-prcomment: '✅ All contributors have signed the CLA. Thank you!'
          create-file-commit-message: 'chore: record CLA signature'
          signed-commit-message: 'chore: $contributorName signed the CLA in #$pullRequestNo'
