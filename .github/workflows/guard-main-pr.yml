# Keep `main` reserved for maintainer release merges from `develop`.
#
# GitHub has no native control to block *opening* a PR by target branch, so this
# workflow auto-closes any PR opened against `main` by someone who isn't the
# maintainer (or an allowlisted bot) and points them at `develop`.
#
# Uses pull_request_target so it still has permission to comment/close on PRs from
# forks. It deliberately does NOT check out or run any PR-supplied code — it only
# uses the token to post a fixed comment and close — so the elevated trigger is safe.
name: "Guard main branch"

on:
  pull_request_target:
    types: [opened, reopened]
    branches: [main]

# Least privilege: only enough to comment on and close the PR.
permissions:
  pull-requests: write

jobs:
  block-non-maintainer:
    runs-on: ubuntu-latest
    # Skip the maintainer's own release PRs and routine bot PRs (Dependabot
    # security updates can target the default branch).
    if: >-
      github.event.pull_request.user.login != 'akar016012' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'github-actions[bot]'
    steps:
      - name: Close PR and redirect to develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment "$PR" --repo "$REPO" --body "Thanks for the contribution! This project follows a git-flow model: \`main\` only receives release merges from the maintainer. Please open your pull request against the **\`develop\`** branch instead. Re-target this PR to \`develop\` (or reopen one from a branch based on \`develop\`) and it'll be reviewed. Closing this one for now."
          gh pr close "$PR" --repo "$REPO"
