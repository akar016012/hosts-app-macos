# CodeQL — static security analysis. Results show up under the repo's Security tab.
#
# Swift is analyzed with a manual, compile-only build (no signing — irrelevant to
# analysis). It deliberately builds only the security-sensitive code: the
# privileged helper (HostsHelper.swift) and the Core logic (signing, PIN, helper
# client, parsing, stores). The SwiftUI views under UI/ are intentionally excluded:
# they compile fine locally (~22s) but CodeQL's Swift extractor stalls for tens of
# minutes on those view bodies on the hosted macOS runner. Skipping UI/ — the least
# security-relevant layer — keeps the scan fast and reliable while still covering
# every code path that touches the privilege boundary, crypto, and untrusted input.
#
# A javascript-typescript leg is intentionally omitted: there is no JS/TS in the
# tracked repo yet (web/ and remotion/ are not committed), and CodeQL hard-fails
# with "no source code seen" when a language matches nothing. Re-add the leg
# (language: javascript-typescript, runner: ubuntu-latest, build-mode: none) once
# web/ or remotion/ are committed.
name: "CodeQL"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly drift scan so newly disclosed query packs catch existing code.
    - cron: "27 4 * * 1"

# Least privilege: only what the action needs to upload results.
permissions:
  contents: read
  security-events: write

# Cancel an in-flight analysis when a newer commit lands on the same ref, so
# superseded runs don't pile up on the slow macOS runner.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: swift
            runner: macos-latest
            build-mode: manual
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Compile-only (-c) so CodeQL can trace the build without needing a link step
      # or signing. Helper + Core only; UI/ is excluded (see header). `-O` is
      # omitted — it's irrelevant to analysis and only slows the type-checker.
      # A step timeout bounds any surprise extractor stall to fast feedback instead
      # of the 60-minute job cap.
      - name: Build Swift sources (helper + Core)
        if: matrix.build-mode == 'manual'
        working-directory: native
        timeout-minutes: 20
        run: |
          swiftc -c HostsHelper.swift -module-name HostsHelper
          swiftc -c -parse-as-library Core/*.swift -module-name HostsCore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          category: "/language:${{ matrix.language }}"
