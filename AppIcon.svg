<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    App icon mirrors the in-app HostsLogoMark (see UI/HeaderViews.swift):
    a white network topology on the accent gradient. All geometry uses the
    same size-relative ratios so the icon and header mark stay identical.
      R  (orbit)        = 0.354 · 512 = 181.2
      cR (central node) = 0.146 · 512 =  74.8
      sR (satellite)    = 0.083 · 512 =  42.5
      lW (line width)   = 0.031 · 512 =  16.0
      dR (inner dot)    = sR · 0.45   =  19.1
    Satellites sit on an equilateral triangle (top, bottom-left, bottom-right).
  -->
  <defs>
    <!-- accentFill: accent2 (#7aa2ff) → accent (#5b8cff), topLeading → bottomTrailing -->
    <linearGradient id="accentFill" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7aa2ff"/>
      <stop offset="100%" stop-color="#5b8cff"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square, 27% corner radius (matches header's 13/48) -->
  <rect width="512" height="512" rx="138" fill="url(#accentFill)"/>

  <g stroke-linecap="round">
    <!-- Connection lines: central-node edge → satellite edge -->
    <line x1="256"   y1="181.3" x2="256"   y2="117.3" stroke="#ffffff" stroke-opacity="0.6" stroke-width="16"/>
    <line x1="191.3" y1="293.4" x2="135.9" y2="325.4" stroke="#ffffff" stroke-opacity="0.6" stroke-width="16"/>
    <line x1="320.7" y1="293.4" x2="376.1" y2="325.4" stroke="#ffffff" stroke-opacity="0.6" stroke-width="16"/>

    <!-- Satellite nodes: hollow white rings -->
    <circle cx="256"   cy="74.8"  r="42.5" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="16"/>
    <circle cx="99.1"  cy="346.6" r="42.5" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="16"/>
    <circle cx="412.9" cy="346.6" r="42.5" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="16"/>
  </g>

  <!-- Satellite inner dots -->
  <circle cx="256"   cy="74.8"  r="19.1" fill="#ffffff" fill-opacity="0.9"/>
  <circle cx="99.1"  cy="346.6" r="19.1" fill="#ffffff" fill-opacity="0.9"/>
  <circle cx="412.9" cy="346.6" r="19.1" fill="#ffffff" fill-opacity="0.9"/>

  <!-- Central hub: solid white circle -->
  <circle cx="256" cy="256" r="74.8" fill="#ffffff" fill-opacity="0.95"/>
</svg>
